services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: customer_service
    ports:
      - "3306:3306"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
    volumes:
      - mysql-data:/var/lib/mysql
      - ../migrations:/docker-entrypoint-initdb.d

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  nginx:
    image: nginx:1.25
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - customer-api
      - customer-ws

  customer-api:
    build:
      context: ..
      dockerfile: deploy/customer-api.Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      - mysql
      - redis

  customer-ws:
    build:
      context: ..
      dockerfile: deploy/customer-ws.Dockerfile
    ports:
      - "8081:8081"
    depends_on:
      - mysql
      - redis

volumes:
  mysql-data:
